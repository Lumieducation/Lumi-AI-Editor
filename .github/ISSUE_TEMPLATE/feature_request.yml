name: "✨ Feature Request"
description: Suggest a new idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your idea! Help us understand the problem and value behind your request.

  - type: textarea
    id: problem
    attributes:
      label: 🤔 Problem / Motivation
      description: What problem does this solve?
      placeholder: |
        I'm frustrated when...
        Currently it's hard to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: What would you like to happen?
      placeholder: |
        Describe the ideal solution in detail.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: What other approaches have you thought about?
      placeholder: |
        Describe alternatives or workarounds you've considered.

  - type: textarea
    id: use-cases
    attributes:
      label: 🎯 Use Cases
      description: Who benefits and how?
      placeholder: |
        - As a [user], I want to...
        - This helps when...

  - type: textarea
    id: scope
    attributes:
      label: 📦 Scope & Impact
      description: What parts of the project would this affect?
      placeholder: |
        API / UI / CLI / Database / Performance / etc.

  - type: dropdown
    id: breaking
    attributes:
      label: ⚠️ Breaking Change?
      options:
        - "No"
        - "Yes"
        - "Not sure"

  - type: textarea
    id: additional
    attributes:
      label: 📎 Additional Context
      description: Mockups, diagrams, links, references